name: Build Extensions

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Node version check
        run: node -v

      - name: NPM version check
        run: npm -v

      - name: Install dependencies
        run: npm i

      - name: Build Chrome and Firefox packages
        run: npm run build

      - name: Read extension versions
        id: versions
        run: |
          chrome_version=$(node -p "JSON.parse(require('fs').readFileSync('Chrome/manifest.json', 'utf8')).version.split('.').join('')")
          firefox_version=$(node -p "JSON.parse(require('fs').readFileSync('FireFox/manifest.json', 'utf8')).version.split('.').join('')")
          echo "chrome_version=$chrome_version" >> "$GITHUB_OUTPUT"
          echo "firefox_version=$firefox_version" >> "$GITHUB_OUTPUT"

      - name: Archive Chrome extension
        working-directory: dist/Chrome
        run: zip -r "../ScriptPatcher.v${{ steps.versions.outputs.chrome_version }}.chrome.zip" .

      - name: Archive Firefox extension
        working-directory: dist/FireFox
        run: zip -r "../ScriptPatcher.v${{ steps.versions.outputs.firefox_version }}.firefox.zip" .

      - name: Upload Chrome artifact
        uses: actions/upload-artifact@v7
        with:
          name: ScriptPatcher.v${{ steps.versions.outputs.chrome_version }}.chrome.zip
          path: dist/ScriptPatcher.v${{ steps.versions.outputs.chrome_version }}.chrome.zip
          archive: false

      - name: Upload Firefox artifact
        uses: actions/upload-artifact@v6
        with:
          name: ScriptPatcher.v${{ steps.versions.outputs.firefox_version }}.firefox.zip
          path: dist/ScriptPatcher.v${{ steps.versions.outputs.firefox_version }}.firefox.zip
          archive: false
